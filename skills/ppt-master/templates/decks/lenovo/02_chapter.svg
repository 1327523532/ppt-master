<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 720">
  <title>Lenovo Chapter Divider (Dark)</title>
  <desc>Lenovo branded section divider — minimal full-bleed dark, white wordmark, centered chapter title and description. Single dark variant (no light); a section break is a visual moment.</desc>

  <rect x="0" y="0" width="1280" height="720" fill="#191919"/>

  <image x="78" y="80" width="160" height="36" xlink:href="logo-dark.png" alt="Lenovo"/>

  <text x="640" y="335" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial, sans-serif" font-size="54" font-weight="700" fill="#F2F2F2">{{CHAPTER_TITLE}}</text>

  <text x="640" y="395" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial, sans-serif" font-size="20" font-weight="400" fill="#A0A0A0">{{CHAPTER_DESC}}</text>

  <line x1="72" y1="664" x2="1208" y2="664" stroke="#3A3A3A" stroke-width="0.5"/>
  <text x="78" y="685" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#F2F2F2">©2026 Lenovo Internal. All rights reserved.</text>
  <text x="640" y="685" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-style="italic" font-weight="400" fill="#A0A0A0">{{DECK_TITLE}}</text>
  <text x="1202" y="685" text-anchor="end" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#F2F2F2">{{PAGE_NUM}} / {{TOTAL_PAGES}}</text>
</svg>
