<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 720">
  <title>Lenovo Cover (Dark)</title>
  <desc>Lenovo branded cover, dark theme — replace {{TITLE}} and {{SUBTITLE}}.</desc>

  <rect x="0" y="0" width="1280" height="720" fill="#191919"/>

  <image x="78" y="80" width="160" height="36" xlink:href="logo-dark.png" alt="Lenovo"/>

  <text x="640" y="332" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial, sans-serif" font-size="43" font-weight="700"
        fill="#F2F2F2" style="text-transform: uppercase">{{TITLE}}</text>

  <text x="640" y="548" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial, sans-serif" font-size="18" font-weight="400"
        fill="#F2F2F2">{{SUBTITLE}}</text>

  <text x="79" y="685" text-anchor="start" dominant-baseline="middle"
        font-family="Arial, sans-serif" font-size="10" font-weight="400"
        fill="#F2F2F2">©2026 Lenovo Internal. All rights reserved.</text>
</svg>
