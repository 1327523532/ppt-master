<!--
  Lenovo-Dark cover (01_cover.svg) — variant of lenovo-template-02.pptx Title Slide.

  Source DNA extracted from lenovo-template-02.pptx P5-P8:
  - Full-bleed background (gradient for light variants, dark plum for dark variants)
  - Top-left "Smarter technology for all" tagline (#FFFFFF)
  - Left-aligned multi-line title (#FFFFFF)
  - "Speaker name | Date" subtitle (#FFFFFF)
  - Right-edge vertical red Lenovo mark (LARGE COVER VARIANT, 204×68 px after 2.5x scale)
    — INLINE SVG paths (no external image dependency)
  - Bottom-left footer: small red Lenovo mark + "2026 Lenovo Internal. All rights reserved." + page number
-->
