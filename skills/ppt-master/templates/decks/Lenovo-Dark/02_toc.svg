<?xml version="1.0" encoding="UTF-8"?>
<!--
  Lenovo-Dark 02_toc.svg — dark variant of the Lenovo replica TOC.

  Ref DNA (mirrors the light TOC): white text on dark surface;
  plum #4D144A accent label and numbers for warm contrast;
  ref footer pattern with white copyright and page number.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="lenovo-dark-toc-title">
  <title id="lenovo-dark-toc-title">Lenovo table of contents (dark theme)</title>

  <!-- Dark background -->
  <rect width="1280" height="720" fill="#1E0113"/>

  <!-- Section label in plum (warmer contrast on dark) -->
  <text x="80" y="100" fill="#4D144A" font-family="Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="3">AGENDA</text>

  <!-- Title in WHITE -->
  <text x="80" y="160" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="58.67" font-weight="bold" letter-spacing="-2">
    {{TOC_TITLE}}
  </text>

  <!-- Thin plum divider under title -->
  <rect x="80" y="180" width="200" height="3" fill="#4D144A"/>

  <!-- 4 agenda items as a 2×2 grid -->
  <g id="toc-items">
    <!-- Item 1 -->
    <text x="80" y="270" fill="#4D144A" font-family="Arial, sans-serif" font-size="44" font-weight="700">01</text>
    <line x1="80" y1="288" x2="200" y2="288" stroke="#4D144A" stroke-width="2"/>
    <text x="80" y="318" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="20" font-weight="700">{{ITEM_1_TITLE}}</text>
    <text x="80" y="342" fill="#FFFFFF" fill-opacity="0.62" font-family="Arial, sans-serif" font-size="13">{{ITEM_1_DESC}}</text>

    <!-- Item 2 -->
    <text x="640" y="270" fill="#4D144A" font-family="Arial, sans-serif" font-size="44" font-weight="700">02</text>
    <line x1="640" y1="288" x2="760" y2="288" stroke="#4D144A" stroke-width="2"/>
    <text x="640" y="318" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="20" font-weight="700">{{ITEM_2_TITLE}}</text>
    <text x="640" y="342" fill="#FFFFFF" fill-opacity="0.62" font-family="Arial, sans-serif" font-size="13">{{ITEM_2_DESC}}</text>

    <!-- Item 3 -->
    <text x="80" y="466" fill="#4D144A" font-family="Arial, sans-serif" font-size="44" font-weight="700">03</text>
    <line x1="80" y1="484" x2="200" y2="484" stroke="#4D144A" stroke-width="2"/>
    <text x="80" y="514" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="20" font-weight="700">{{ITEM_3_TITLE}}</text>
    <text x="80" y="538" fill="#FFFFFF" fill-opacity="0.62" font-family="Arial, sans-serif" font-size="13">{{ITEM_3_DESC}}</text>

    <!-- Item 4 -->
    <text x="640" y="466" fill="#4D144A" font-family="Arial, sans-serif" font-size="44" font-weight="700">04</text>
    <line x1="640" y1="484" x2="760" y2="484" stroke="#4D144A" stroke-width="2"/>
    <text x="640" y="514" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="20" font-weight="700">{{ITEM_4_TITLE}}</text>
    <text x="640" y="538" fill="#FFFFFF" fill-opacity="0.62" font-family="Arial, sans-serif" font-size="13">{{ITEM_4_DESC}}</text>
  </g>

  <!-- Bottom-left footer: red Lenovo mark + WHITE copyright -->
  <g transform="translate(80 666.5)">
    <g transform="scale(0.98)">
      <rect x="79.83" y="666.49" width="81.6" height="27.22" fill="#E1251B" transform="translate(-79.83 -666.49)"/>
      <g transform="translate(-79.83 -666.49)">
        <path d="M 96.89 683.64 L 90.36 683.64 L 90.36 672.69 L 87.45 672.69 L 87.45 686.28 L 96.89 686.28 L 96.89 683.64 Z" fill="#FFFFFF"/>
        <path d="M 106.06 683.07 C 104.85 683.96 104.16 684.18 103.07 684.18 C 102.07 684.18 101.29 683.87 100.75 683.32 C 108.09 680.27 108.09 680.27 108.09 680.27 C 107.92 679.15 107.5 678.13 106.84 677.36 C 105.87 676.24 104.44 675.64 102.71 675.64 C 99.55 675.64 97.18 677.97 97.18 681.05 C 97.18 684.22 99.56 686.46 103.03 686.46 C 104.97 686.46 106.95 685.54 107.88 684.46 L 106.06 683.07 Z M 100.55 678.97 C 101.04 678.32 101.82 677.92 102.76 677.92 C 103.79 677.92 104.58 678.52 104.98 679.39 C 99.97 681.47 99.97 681.47 99.97 681.47 C 99.83 680.41 100.11 679.57 100.55 678.97 Z" fill="#FFFFFF"/>
        <path d="M 115.39 675.64 C 114.19 675.64 112.83 676.2 111.99 677.32 C 111.99 677.32 111.99 677.32 111.99 677.32 C 111.99 677.32 111.99 677.32 111.99 677.32 C 111.99 675.81 111.99 675.81 111.99 675.81 C 109.12 675.81 109.12 675.81 109.12 675.81 C 109.12 686.28 109.12 686.28 109.12 686.28 C 111.99 686.28 111.99 686.28 111.99 686.28 C 111.99 680.32 111.99 680.32 111.99 680.32 C 111.99 679.25 112.82 678.11 114.36 678.11 C 115.55 678.11 116.77 678.94 116.77 680.32 C 116.77 686.28 116.77 686.28 116.77 686.28 C 119.64 686.28 119.64 686.28 119.64 686.28 C 119.64 679.8 119.64 679.8 119.64 679.8 C 119.64 677.38 117.92 675.64 115.39 675.64" fill="#FFFFFF"/>
        <path d="M 126.37 686.46 C 123.24 686.46 120.78 684.11 120.78 681.05 C 120.78 678.01 123.26 675.64 126.41 675.64 C 129.56 675.64 132.02 677.99 132.02 681.05 C 132.02 684.09 129.53 686.46 126.37 686.46 M 126.37 678.1 C 124.78 678.1 123.61 679.31 123.61 681.05 C 123.61 682.7 124.84 684 126.41 684 C 128.02 684 129.19 682.75 129.19 681.05 C 129.19 679.4 127.95 678.1 126.37 678.1" fill="#FFFFFF"/>
        <path d="M 140.04 675.82 L 137.45 682.95 L 134.85 675.82 L 131.57 675.82 L 135.88 686.28 L 139.02 686.28 L 143.33 675.82 L 140.04 675.82 Z" fill="#FFFFFF"/>
        <path d="M 148.48 686.46 C 145.34 686.46 142.88 684.11 142.88 681.05 C 142.88 678.01 145.35 675.64 148.51 675.64 C 151.65 675.64 154.11 677.99 154.11 681.05 C 154.11 684.09 151.64 686.46 148.48 686.46 M 148.48 678.1 C 146.87 678.1 145.71 679.31 145.71 681.05 C 145.71 682.7 146.95 684 148.51 684 C 150.12 684 151.28 682.75 151.28 681.05 C 151.28 679.4 150.04 678.1 148.48 678.1" fill="#FFFFFF"/>
      </g>
    </g>
  </g>
  <text x="170" y="685" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="13.33">2026 Lenovo Internal. All rights reserved.</text>

  <!-- Bottom-right: page number in WHITE -->
  <text x="1248" y="688" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="13.33">{{PAGE_NUM}}</text>

  <!-- Tiny layout-name in dim grey -->
  <text x="640" y="736" text-anchor="middle" fill="#4E444E" font-family="Arial, sans-serif" font-size="10.67">Agenda</text>
</svg>