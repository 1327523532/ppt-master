<?xml version="1.0" encoding="UTF-8"?>
<!--
  Lenovo Light content — three-column deep (04d_content_three_deep.svg).

  Ref: P60 "3 column deep layout" — full-page 3 equal vertical color columns,
  each with a circular white-line icon + 2-line white title + 1-line description.

  Column colors (per source P60):
    Column 1: #B23A2A (brick red)
    Column 2: #6D1C69 (purple)
    Column 3: #21386A (deep blue)
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="lenovo-light-content-3deep-title">
  <title id="lenovo-light-content-3deep-title">Lenovo content — three column deep (full-height blocks)</title>

  <!-- Three full-height columns -->
  <rect x="0" y="0" width="426.67" height="720" fill="#B23A2A"/>
  <rect x="426.67" y="0" width="426.66" height="720" fill="#6D1C69"/>
  <rect x="853.33" y="0" width="426.67" height="720" fill="#21386A"/>

  <!-- Column 1: brick red — cubes icon -->
  <g transform="translate(213.33 230)">
    <circle cx="0" cy="0" r="50" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
    <g transform="translate(-22 -22)" fill="none" stroke="#FFFFFF" stroke-width="2.5">
      <path d="M 12 0 L 24 7 L 24 21 L 12 28 L 0 21 L 0 7 Z"/>
      <path d="M 12 0 L 24 7 L 12 14 L 0 7 Z"/>
      <line x1="12" y1="14" x2="12" y2="28"/>
    </g>
  </g>
  <text x="213.33" y="370" text-anchor="middle" fill="#FFFFFF" font-family="Arial, Microsoft YaHei, sans-serif" font-size="32" font-weight="700">
    <tspan x="213.33" dy="0">{{COL_1_TITLE_LINE_1}}</tspan>
    <tspan x="213.33" dy="36">{{COL_1_TITLE_LINE_2}}</tspan>
  </text>
  <text x="213.33" y="500" text-anchor="middle" fill="#FFFFFF" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15">
    {{COL_1_DESC}}
  </text>

  <!-- Column 2: purple — brain icon -->
  <g transform="translate(640 230)">
    <circle cx="0" cy="0" r="50" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
    <g transform="translate(-22 -22)" fill="none" stroke="#FFFFFF" stroke-width="2.5">
      <path d="M 12 0 C 5 0 0 5 0 12 C 0 15 1 17 3 19 C 1 21 0 24 0 26 C 0 33 5 38 12 38 C 14 38 16 37 18 36 C 19 37 21 38 23 38 C 28 38 33 33 33 26 C 33 24 32 21 30 19 C 32 17 33 15 33 12 C 33 5 28 0 21 0 C 19 0 17 1 15 2 C 14 1 12 0 12 0 Z"/>
      <line x1="17" y1="7" x2="17" y2="32"/>
    </g>
  </g>
  <text x="640" y="370" text-anchor="middle" fill="#FFFFFF" font-family="Arial, Microsoft YaHei, sans-serif" font-size="32" font-weight="700">
    <tspan x="640" dy="0">{{COL_2_TITLE_LINE_1}}</tspan>
    <tspan x="640" dy="36">{{COL_2_TITLE_LINE_2}}</tspan>
  </text>
  <text x="640" y="500" text-anchor="middle" fill="#FFFFFF" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15">
    {{COL_2_DESC}}
  </text>

  <!-- Column 3: deep blue — lightbulb icon -->
  <g transform="translate(1066.67 230)">
    <circle cx="0" cy="0" r="50" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
    <g transform="translate(-22 -22)" fill="none" stroke="#FFFFFF" stroke-width="2.5">
      <path d="M 12 0 C 5 0 0 6 0 13 C 0 17 2 21 6 24 L 6 31 L 18 31 L 18 24 C 22 21 24 17 24 13 C 24 6 19 0 12 0 Z"/>
      <line x1="9" y1="35" x2="15" y2="35"/>
      <line x1="10" y1="40" x2="14" y2="40"/>
    </g>
  </g>
  <text x="1066.67" y="370" text-anchor="middle" fill="#FFFFFF" font-family="Arial, Microsoft YaHei, sans-serif" font-size="32" font-weight="700">
    <tspan x="1066.67" dy="0">{{COL_3_TITLE_LINE_1}}</tspan>
    <tspan x="1066.67" dy="36">{{COL_3_TITLE_LINE_2}}</tspan>
  </text>
  <text x="1066.67" y="500" text-anchor="middle" fill="#FFFFFF" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15">
    {{COL_3_DESC}}
  </text>

  <!-- Bottom-right: page number (white) -->
  <text x="1248" y="688" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="13.33">{{PAGE_NUM}}</text>
</svg>