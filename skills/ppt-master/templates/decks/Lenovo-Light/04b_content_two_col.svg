<?xml version="1.0" encoding="UTF-8"?>
<!--
  Lenovo Light content — two-column (04b_content_two_col.svg).

  Ref: P40 "Goals and objectives" — top-left title, then 3 stacked colored cards
  on the left (purple / dark red / dark plum) and 1 tall purple card on the right.
  Each card has a circular white-line icon + white title + description + 2 bullets.

  Card colors (from ref P40):
    Left card 1 stripe: #6D1C69 (purple)
    Left card 2 stripe: #871C23 (dark Lenovo red)
    Left card 3 stripe: #4D144A (deep plum)
    Right card:         #6D1C69 (purple, gradient down to plum)
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="lenovo-light-content-2col-title">
  <title id="lenovo-light-content-2col-title">Lenovo content — two column (goals and objectives)</title>

  <!-- White background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- Top-left title (P40 title) -->
  <text x="80" y="100" fill="#000000" font-family="Arial, Microsoft YaHei, sans-serif" font-size="42" font-weight="700" letter-spacing="-1.5">
    {{PAGE_TITLE}}
  </text>
  <text x="80" y="135" fill="#000000" font-family="Arial, Microsoft YaHei, sans-serif" font-size="20">
    {{PAGE_SUBTITLE}}
  </text>

  <defs>
    <linearGradient id="rightCard2Col" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6D1C69"/>
      <stop offset="100%" stop-color="#4D144A"/>
    </linearGradient>
  </defs>

  <!-- LEFT — 3 stacked cards (purple / red / plum) -->
  <!-- Card 1: purple -->
  <rect x="80" y="180" width="640" height="120" fill="#6D1C69"/>
  <circle cx="160" cy="240" r="40" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  <!-- cubes icon -->
  <g transform="translate(140 220)" fill="none" stroke="#FFFFFF" stroke-width="2.5">
    <path d="M 10 0 L 20 6 L 20 18 L 10 24 L 0 18 L 0 6 Z"/>
    <path d="M 10 0 L 20 6 L 10 12 L 0 6 Z"/>
    <line x1="10" y1="12" x2="10" y2="24"/>
  </g>
  <text x="220" y="225" fill="#FFFFFF" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" font-weight="700">{{LEFT_CARD_1_TITLE}}</text>
  <text x="220" y="250" fill="#FFFFFF" fill-opacity="0.85" font-family="Arial, Microsoft YaHei, sans-serif" font-size="13">{{LEFT_CARD_1_DESC}}</text>
  <text x="220" y="272" fill="#FFFFFF" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12">•  {{LEFT_CARD_1_BULLET_1}}</text>
  <text x="220" y="289" fill="#FFFFFF" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12">•  {{LEFT_CARD_1_BULLET_2}}</text>

  <!-- Card 2: dark red -->
  <rect x="80" y="310" width="640" height="120" fill="#871C23"/>
  <circle cx="160" cy="370" r="40" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  <!-- brain icon -->
  <g transform="translate(140 350)" fill="none" stroke="#FFFFFF" stroke-width="2.5">
    <path d="M 10 0 C 4 0 0 4 0 10 C 0 12 1 14 2 16 C 1 18 0 20 0 22 C 0 28 4 32 10 32 C 12 32 14 31 15 30 C 16 31 18 32 20 32 C 24 32 28 28 28 22 C 28 20 27 18 26 16 C 27 14 28 12 28 10 C 28 4 24 0 18 0 C 16 0 14 1 12 2 C 11 1 10 0 10 0 Z"/>
    <line x1="14" y1="6" x2="14" y2="28"/>
  </g>
  <text x="220" y="355" fill="#FFFFFF" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" font-weight="700">{{LEFT_CARD_2_TITLE}}</text>
  <text x="220" y="380" fill="#FFFFFF" fill-opacity="0.85" font-family="Arial, Microsoft YaHei, sans-serif" font-size="13">{{LEFT_CARD_2_DESC}}</text>
  <text x="220" y="402" fill="#FFFFFF" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12">•  {{LEFT_CARD_2_BULLET_1}}</text>
  <text x="220" y="419" fill="#FFFFFF" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12">•  {{LEFT_CARD_2_BULLET_2}}</text>

  <!-- Card 3: deep plum -->
  <rect x="80" y="440" width="640" height="120" fill="#4D144A"/>
  <circle cx="160" cy="500" r="40" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  <!-- lightbulb icon -->
  <g transform="translate(140 478)" fill="none" stroke="#FFFFFF" stroke-width="2.5">
    <path d="M 10 0 C 4 0 0 5 0 11 C 0 15 2 18 5 20 L 5 26 L 15 26 L 15 20 C 18 18 20 15 20 11 C 20 5 16 0 10 0 Z"/>
    <line x1="7" y1="30" x2="13" y2="30"/>
    <line x1="8" y1="34" x2="12" y2="34"/>
  </g>
  <text x="220" y="485" fill="#FFFFFF" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" font-weight="700">{{LEFT_CARD_3_TITLE}}</text>
  <text x="220" y="510" fill="#FFFFFF" fill-opacity="0.85" font-family="Arial, Microsoft YaHei, sans-serif" font-size="13">{{LEFT_CARD_3_DESC}}</text>
  <text x="220" y="532" fill="#FFFFFF" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12">•  {{LEFT_CARD_3_BULLET_1}}</text>
  <text x="220" y="549" fill="#FFFFFF" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12">•  {{LEFT_CARD_3_BULLET_2}}</text>

  <!-- RIGHT — single tall purple-to-plum gradient card -->
  <rect x="750" y="180" width="450" height="380" fill="url(#rightCard2Col)"/>
  <text x="780" y="240" fill="#FFFFFF" font-family="Arial, Microsoft YaHei, sans-serif" font-size="22" font-weight="700">{{RIGHT_CARD_TITLE}}</text>
  <text x="780" y="280" fill="#FFFFFF" fill-opacity="0.92" font-family="Arial, Microsoft YaHei, sans-serif" font-size="14">{{RIGHT_CARD_DESC}}</text>
  <text x="780" y="350" fill="#FFFFFF" font-family="Arial, Microsoft YaHei, sans-serif" font-size="14">•  {{RIGHT_CARD_BULLET_1}}</text>
  <text x="780" y="378" fill="#FFFFFF" font-family="Arial, Microsoft YaHei, sans-serif" font-size="14">•  {{RIGHT_CARD_BULLET_2}}</text>
  <text x="780" y="406" fill="#FFFFFF" font-family="Arial, Microsoft YaHei, sans-serif" font-size="14">•  {{RIGHT_CARD_BULLET_3}}</text>

  <!-- Bottom-left footer: red Lenovo mark + copyright -->
  <g id="lenovo-footer-mark">
    <rect x="80" y="666.5" width="81.6" height="27.22" fill="#E1251B"/>
    <path d="M 96.89 683.64 L 90.36 683.64 L 90.36 672.69 L 87.45 672.69 L 87.45 686.28 L 96.89 686.28 L 96.89 683.64 Z" fill="#FFFFFF"/>
    <path d="M 106.06 683.07 C 104.85 683.96 104.16 684.18 103.07 684.18 C 102.07 684.18 101.29 683.87 100.75 683.32 C 108.09 680.27 108.09 680.27 108.09 680.27 C 107.92 679.15 107.5 678.13 106.84 677.36 C 105.87 676.24 104.44 675.64 102.71 675.64 C 99.55 675.64 97.18 677.97 97.18 681.05 C 97.18 684.22 99.56 686.46 103.03 686.46 C 104.97 686.46 106.95 685.54 107.88 684.46 L 106.06 683.07 Z M 100.55 678.97 C 101.04 678.32 101.82 677.92 102.76 677.92 C 103.79 677.92 104.58 678.52 104.98 679.39 C 99.97 681.47 99.97 681.47 99.97 681.47 C 99.83 680.41 100.11 679.57 100.55 678.97 Z" fill="#FFFFFF"/>
    <path d="M 115.39 675.64 C 114.19 675.64 112.83 676.2 111.99 677.32 C 111.99 677.32 111.99 677.32 111.99 677.32 C 111.99 677.32 111.99 677.32 111.99 677.32 C 111.99 675.81 111.99 675.81 111.99 675.81 C 109.12 675.81 109.12 675.81 109.12 675.81 C 109.12 686.28 109.12 686.28 109.12 686.28 C 111.99 686.28 111.99 686.28 111.99 686.28 C 111.99 680.32 111.99 680.32 111.99 680.32 C 111.99 679.25 112.82 678.11 114.36 678.11 C 115.55 678.11 116.77 678.94 116.77 680.32 C 116.77 686.28 116.77 686.28 116.77 686.28 C 119.64 686.28 119.64 686.28 119.64 686.28 C 119.64 679.8 119.64 679.8 119.64 679.8 C 119.64 677.38 117.92 675.64 115.39 675.64" fill="#FFFFFF"/>
    <path d="M 126.37 686.46 C 123.24 686.46 120.78 684.11 120.78 681.05 C 120.78 678.01 123.26 675.64 126.41 675.64 C 129.56 675.64 132.02 677.99 132.02 681.05 C 132.02 684.09 129.53 686.46 126.37 686.46 M 126.37 678.1 C 124.78 678.1 123.61 679.31 123.61 681.05 C 123.61 682.7 124.84 684 126.41 684 C 128.02 684 129.19 682.75 129.19 681.05 C 129.19 679.4 127.95 678.1 126.37 678.1" fill="#FFFFFF"/>
    <path d="M 140.04 675.82 L 137.45 682.95 L 134.85 675.82 L 131.57 675.82 L 135.88 686.28 L 139.02 686.28 L 143.33 675.82 L 140.04 675.82 Z" fill="#FFFFFF"/>
    <path d="M 148.48 686.46 C 145.34 686.46 142.88 684.11 142.88 681.05 C 142.88 678.01 145.35 675.64 148.51 675.64 C 151.65 675.64 154.11 677.99 154.11 681.05 C 154.11 684.09 151.64 686.46 148.48 686.46 M 148.48 678.1 C 146.87 678.1 145.71 679.31 145.71 681.05 C 145.71 682.7 146.95 684 148.51 684 C 150.12 684 151.28 682.75 151.28 681.05 C 151.28 679.4 150.04 678.1 148.48 678.1" fill="#FFFFFF"/>
  </g>
  <text x="170" y="685" fill="#000000" font-family="Arial, sans-serif" font-size="13.33">2026 Lenovo Internal. All rights reserved.</text>

  <!-- Bottom-right: page number -->
  <text x="1248" y="688" text-anchor="middle" fill="#000000" font-family="Arial, sans-serif" font-size="13.33">{{PAGE_NUM}}</text>
</svg>