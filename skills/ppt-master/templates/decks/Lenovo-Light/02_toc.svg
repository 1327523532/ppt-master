<?xml version="1.0" encoding="UTF-8"?>
<!--
  Lenovo Light TOC (02_toc.svg) — clean agenda layout.

  Ref: Section Header_White layout DNA (P9, P30 "Strategy"), but with an agenda list of 4 items.
  - White background
  - Top-left "AGENDA" eyebrow label in plum, all-caps, letter-spaced
  - Top-left big black title in Arial bold
  - 4 agenda items in 2×2 grid: plum 2-digit number, plum short underline, black title, gray description
  - Footer: red Lenovo mark + copyright + page number

  Note: source P9 only has a single "Section header" title; for a TOC the agenda list is the canonical
  addition. Each item has number / underline / title / description 4-line micro-block.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="lenovo-light-toc-title">
  <title id="lenovo-light-toc-title">Lenovo table of contents (light)</title>

  <!-- White background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- Eyebrow label -->
  <text x="80" y="100" fill="#4D144A" font-family="Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="4">AGENDA</text>

  <!-- TOC title (matches P9 / P30 / P48 left-aligned black title style) -->
  <text x="80" y="180" fill="#000000" font-family="Arial, sans-serif" font-size="58" font-weight="700" letter-spacing="-1.5">
    {{TOC_TITLE}}
  </text>

  <!-- 2x2 agenda grid: 4 items, each number+underline+title+description -->
  <g id="toc-items">
    <!-- Item 1 (top-left) -->
    <text x="80" y="320" fill="#4D144A" font-family="Arial, sans-serif" font-size="44" font-weight="700">01</text>
    <rect x="80" y="338" width="120" height="3" fill="#4D144A"/>
    <text x="80" y="378" fill="#000000" font-family="Arial, sans-serif" font-size="22" font-weight="700">{{ITEM_1_TITLE}}</text>
    <text x="80" y="406" fill="#000000" fill-opacity="0.62" font-family="Arial, sans-serif" font-size="14">{{ITEM_1_DESC}}</text>

    <!-- Item 2 (top-right) -->
    <text x="680" y="320" fill="#4D144A" font-family="Arial, sans-serif" font-size="44" font-weight="700">02</text>
    <rect x="680" y="338" width="120" height="3" fill="#4D144A"/>
    <text x="680" y="378" fill="#000000" font-family="Arial, sans-serif" font-size="22" font-weight="700">{{ITEM_2_TITLE}}</text>
    <text x="680" y="406" fill="#000000" fill-opacity="0.62" font-family="Arial, sans-serif" font-size="14">{{ITEM_2_DESC}}</text>

    <!-- Item 3 (bottom-left) -->
    <text x="80" y="510" fill="#4D144A" font-family="Arial, sans-serif" font-size="44" font-weight="700">03</text>
    <rect x="80" y="528" width="120" height="3" fill="#4D144A"/>
    <text x="80" y="568" fill="#000000" font-family="Arial, sans-serif" font-size="22" font-weight="700">{{ITEM_3_TITLE}}</text>
    <text x="80" y="596" fill="#000000" fill-opacity="0.62" font-family="Arial, sans-serif" font-size="14">{{ITEM_3_DESC}}</text>

    <!-- Item 4 (bottom-right) -->
    <text x="680" y="510" fill="#4D144A" font-family="Arial, sans-serif" font-size="44" font-weight="700">04</text>
    <rect x="680" y="528" width="120" height="3" fill="#4D144A"/>
    <text x="680" y="568" fill="#000000" font-family="Arial, sans-serif" font-size="22" font-weight="700">{{ITEM_4_TITLE}}</text>
    <text x="680" y="596" fill="#000000" fill-opacity="0.62" font-family="Arial, sans-serif" font-size="14">{{ITEM_4_DESC}}</text>
  </g>

  <!-- Bottom-left footer: red Lenovo mark + copyright -->
  <g id="lenovo-footer-mark">
    <rect x="80" y="666.5" width="81.6" height="27.22" fill="#E1251B"/>
    <path d="M 96.89 683.64 L 90.36 683.64 L 90.36 672.69 L 87.45 672.69 L 87.45 686.28 L 96.89 686.28 L 96.89 683.64 Z" fill="#FFFFFF"/>
    <path d="M 106.06 683.07 C 104.85 683.96 104.16 684.18 103.07 684.18 C 102.07 684.18 101.29 683.87 100.75 683.32 C 108.09 680.27 108.09 680.27 108.09 680.27 C 107.92 679.15 107.5 678.13 106.84 677.36 C 105.87 676.24 104.44 675.64 102.71 675.64 C 99.55 675.64 97.18 677.97 97.18 681.05 C 97.18 684.22 99.56 686.46 103.03 686.46 C 104.97 686.46 106.95 685.54 107.88 684.46 L 106.06 683.07 Z M 100.55 678.97 C 101.04 678.32 101.82 677.92 102.76 677.92 C 103.79 677.92 104.58 678.52 104.98 679.39 C 99.97 681.47 99.97 681.47 99.97 681.47 C 99.83 680.41 100.11 679.57 100.55 678.97 Z" fill="#FFFFFF"/>
    <path d="M 115.39 675.64 C 114.19 675.64 112.83 676.2 111.99 677.32 C 111.99 677.32 111.99 677.32 111.99 677.32 C 111.99 677.32 111.99 677.32 111.99 677.32 C 111.99 675.81 111.99 675.81 111.99 675.81 C 109.12 675.81 109.12 675.81 109.12 675.81 C 109.12 686.28 109.12 686.28 109.12 686.28 C 111.99 686.28 111.99 686.28 111.99 686.28 C 111.99 680.32 111.99 680.32 111.99 680.32 C 111.99 679.25 112.82 678.11 114.36 678.11 C 115.55 678.11 116.77 678.94 116.77 680.32 C 116.77 686.28 116.77 686.28 116.77 686.28 C 119.64 686.28 119.64 686.28 119.64 686.28 C 119.64 679.8 119.64 679.8 119.64 679.8 C 119.64 677.38 117.92 675.64 115.39 675.64" fill="#FFFFFF"/>
    <path d="M 126.37 686.46 C 123.24 686.46 120.78 684.11 120.78 681.05 C 120.78 678.01 123.26 675.64 126.41 675.64 C 129.56 675.64 132.02 677.99 132.02 681.05 C 132.02 684.09 129.53 686.46 126.37 686.46 M 126.37 678.1 C 124.78 678.1 123.61 679.31 123.61 681.05 C 123.61 682.7 124.84 684 126.41 684 C 128.02 684 129.19 682.75 129.19 681.05 C 129.19 679.4 127.95 678.1 126.37 678.1" fill="#FFFFFF"/>
    <path d="M 140.04 675.82 L 137.45 682.95 L 134.85 675.82 L 131.57 675.82 L 135.88 686.28 L 139.02 686.28 L 143.33 675.82 L 140.04 675.82 Z" fill="#FFFFFF"/>
    <path d="M 148.48 686.46 C 145.34 686.46 142.88 684.11 142.88 681.05 C 142.88 678.01 145.35 675.64 148.51 675.64 C 151.65 675.64 154.11 677.99 154.11 681.05 C 154.11 684.09 151.64 686.46 148.48 686.46 M 148.48 678.1 C 146.87 678.1 145.71 679.31 145.71 681.05 C 145.71 682.7 146.95 684 148.51 684 C 150.12 684 151.28 682.75 151.28 681.05 C 151.28 679.4 150.04 678.1 148.48 678.1" fill="#FFFFFF"/>
  </g>
  <text x="170" y="685" fill="#000000" font-family="Arial, sans-serif" font-size="13.33">2026 Lenovo Internal. All rights reserved.</text>

  <!-- Bottom-right: page number -->
  <text x="1248" y="688" text-anchor="middle" fill="#000000" font-family="Arial, sans-serif" font-size="13.33">{{PAGE_NUM}}</text>
</svg>