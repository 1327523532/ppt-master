<!--
  Lenovo cover (01_cover.svg) — replica of ref/Lenovo-template_light.pptx slide_02.

  Ref DNA (from slide_02):
  - White page background (no gradient, no top brand strip)
  - Title in PLUM #4D144A, Arial bold, 106.67pt (3 lines)
  - Subtitle in PLUM #4D144A, Arial regular, 34.67pt
  - Bottom-left: small red Lenovo mark (~80×27) + copyright "2026 Lenovo Internal. All rights reserved."
  - Bottom-right: page number
  - Right edge: rotated red Lenovo logo as the signature cover element

  Strategy for the rotated red right-edge logo: the ref uses a 90°-rotated, scaled-up
  version of the same Lenovo wordmark paths. We render the same letterforms at a larger
  scale, rotated 270°, on the right edge. Letterform paths are reused from lenovo_mark.svg
  (extracted verbatim from ref slide_01) and embedded inline.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="lenovo-cover-title">
  <title id="lenovo-cover-title">Lenovo cover</title>

  <!-- White page background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- Title in PLUM #4D144A, Arial bold 106.67pt (matches ref slide_02) -->
  <text x="88" y="256" fill="#4D144A" font-family="Arial, sans-serif" font-size="106.67" font-weight="bold" letter-spacing="-2">
    <tspan x="88" dy="0">{{TITLE_LINE_1}}</tspan>
    <tspan x="88" dy="80">{{TITLE_LINE_2}}</tspan>
    <tspan x="88" dy="80">{{TITLE_LINE_3}}</tspan>
  </text>

  <!-- Subtitle in PLUM, 34.67pt (matches ref slide_02 "Speaker name | Date") -->
  <text x="89" y="564" fill="#4D144A" font-family="Arial, sans-serif" font-size="34.67">
    {{SUBTITLE}}
  </text>

  <!--
