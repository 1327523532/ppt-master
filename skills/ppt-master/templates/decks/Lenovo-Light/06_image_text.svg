<?xml version="1.0" encoding="UTF-8"?>
<!--
  Lenovo Light content — image + text (06_image_text.svg).

  Ref: P20 "Content with image layout" — left column text (title + bullet list),
  right column a large image.
  - White background
  - Left 50%: top title (Arial bold 28pt) + 3 bullet items
  - Right 50%: large image placeholder marked with {{IMAGE}} — Strategist / image_gen
    is expected to either inject an actual image URL or leave the marker for runtime
    image insertion.
  - Footer: red Lenovo mark + copyright + page number
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="lenovo-light-image-text-title">
  <title id="lenovo-light-image-text-title">Lenovo content — image and text</title>

  <!-- White background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- Left column: title + bullet list -->
  <text x="80" y="120" fill="#000000" font-family="Arial, Microsoft YaHei, sans-serif" font-size="32" font-weight="700" letter-spacing="-1">
    {{PAGE_TITLE}}
  </text>
  <rect x="80" y="138" width="120" height="3" fill="#4D144A"/>

  <text x="80" y="220" fill="#000000" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16">•  {{BULLET_1}}</text>
  <text x="80" y="252" fill="#000000" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16">•  {{BULLET_2}}</text>
  <text x="80" y="284" fill="#000000" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16">•  {{BULLET_3}}</text>

  <!-- Optional supporting description -->
  <text x="80" y="380" fill="#000000" fill-opacity="0.72" font-family="Arial, Microsoft YaHei, sans-serif" font-size="14">{{SUPPORTING_TEXT}}</text>

  <!-- Right column: large image placeholder -->
  <rect x="640" y="80" width="560" height="500" fill="#F2EEF3" stroke="#4D144A" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="920" y="330" text-anchor="middle" fill="#4D144A" fill-opacity="0.55" font-family="Arial, sans-serif" font-size="20" font-weight="700" letter-spacing="2">{{IMAGE}}</text>
  <text x="920" y="360" text-anchor="middle" fill="#4D144A" fill-opacity="0.4" font-family="Arial, sans-serif" font-size="12">560 × 500 image area</text>

  <!-- Bottom-left footer: red Lenovo mark + copyright -->
  <g id="lenovo-footer-mark">
    <rect x="80" y="666.5" width="81.6" height="27.22" fill="#E1251B"/>
